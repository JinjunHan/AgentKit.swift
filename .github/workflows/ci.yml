name: AgentKit CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-macos:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
    - name: Set up Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: '6.2'
    - name: Build Package
      run: swift build -v
    - name: Run Tests
      run: swift test -v

  build-ios-demo:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
    - name: Build iOS Demo
      run: |
        xcodebuild -project Examples/iOS/AgentKit-iOSDemo/AgentKit-iOSDemo.xcodeproj \
        -scheme AgentKit-iOSDemo \
        -destination "generic/platform=iOS Simulator" \
        build
